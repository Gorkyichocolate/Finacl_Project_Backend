server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  location ~ ^/static/html/(.*)$ {
    return 301 /$1;
  }

  # Redirect legacy static-prefixed URLs to canonical paths.
  location ~ ^/static/(.*)$ {
    return 301 /$1;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
